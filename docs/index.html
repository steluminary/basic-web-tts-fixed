<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Piper Voice Benchmarks</title>

  <style>
    body {
      font-family: system-ui, Arial, sans-serif;
      margin: 24px;
      background: #fafafa;
      color: #111;
    }

    h1 { margin-bottom: 6px; }

    .sub {
      color: #666;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 12px;
    }

    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 12px;
    }

    .name {
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 14px;
    }

    audio {
      width: 100%;
      margin-top: 6px;
    }

    .links {
      margin-top: 6px;
      font-size: 12px;
    }

    .links a {
      margin-right: 10px;
      color: #0366d6;
      text-decoration: none;
    }

    .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<h1>Piper Voice Benchmarks</h1>
<div class="sub">
  Click play to compare voices. RTF is embedded in filename list (static view).
</div>

<div id="app">Loading...</div>

<script src="app.js"></script>

</body>
</html>
